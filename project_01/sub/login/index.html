<!DOCTYPE html>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../js/header.js"></script>

    <script>
        function formCheck(form) {
            if(form.userId.value == "") {
                alert('이메일을 입력하세요.')
                return
            }
            if(form.userPw.value == "") {
                alert('비밀번호를 입력하세요.')
                return
            }
            alert('로그인 되었습니다.')
            form.reset()
        }
    </script>
    

</head>

            <input type="checkbox" id="search_chk">

                </label>

                    <span><i class="fa-solid fa-xmark"></i></span>
                </label>
                <div class="search_box">
                    <input type="search" name="search_txt" class="search_txt">
                    <span><a href="../search_result/index.html" ><i class="fa-solid fa-magnifying-glass"></i></a></span>
                </div>                      <!-- search_box -->

                <div class="cart_box box">
                    <p class="tit">장바구니</p>
                    <div class="product_box">
                        <a href="../2_product/all/detail/index.html">

                                <img src="./img/cart01.jpg" alt="cart01">
                            </div>
                            <div class="popup_txt">
                                <p>불렛저널</p>
                                <p>7,900원</p>
                            </div>
                        </a>
                    </div>
                    <div class="product_box second">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="./img/cart02.jpg" alt="cart02">

                </div>                  <!-- cart_box -->

                    <div class="product_box">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="./img/recent01.jpg" alt="recent01">
                            </div>
                            <div class="popup_txt">
                                <p>만년형 심플 다이어리</p>
                                <p>8,000원</p>
                            </div>
                        </a>
                    </div>
                    <div class="product_box second">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="./img/recent02.jpg" alt="recent02">
                            </div>
                            <div class="popup_txt">

                <span><a href="../login/index.html"><i class="fa-solid fa-user"></i></a></span>

        </header>
    </header>           <!-- header -->

    <form method="post" action="">
        <div class="login_box">
            <h2>로그인</h2>
            <input type="text" name="userId" placeholder="이메일" class="input">
            <input type="password" name="userPw" placeholder="비밀번호" class="input">
            <label for="remember-chk">
                <input type="checkbox" id="remember_chk">
                <span class="remember_chk">아이디 저장하기</span>
            </label>
            <span class="join"><a href="../join/index.html" target="_blank">회원가입</a></span><br>
            <input type="button" value="Login" class="login" onclick="formCheck(this.form)">
        </div>
    </form>

</body>
</html>
