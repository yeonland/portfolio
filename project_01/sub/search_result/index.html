<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색결과</title>
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/search_result.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- font-awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang&family=Gowun+Dodum&display=swap" rel="stylesheet">
    <!-- font Gowun+Dodum -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- font Jua -->

</head>
<body>
    <header class="header_outer" id="header">
        <div class="header">
            <div class="logo">
                <img src="../../img/00_logo.png" alt="soha_logo">
            </div>           <!-- logo -->
            <nav class="gnb">
                <span><a href="../1_brand/index.html">소하는요</a></span>
                <span class="product">
                    <a href="../2_product/all/index.html">디지털 문구</a>
                    <div class="product_menu">
                        <div><a href="../2_product/diary/index.html">다이어리</a></div>
                        <div><a href="../2_product/planner/index.html">플래너</a></div>
                        <div><a href="../2_product/journal/index.html">저널</a></div>
                        <div><a href="../2_product/sticker/index.html">스티커</a></div>
                        <div><a href="../2_product/free/index.html">무료</a></div>
                    </div>
                </span>
                <span><a href="../3_review/index.html">솔직후기</a></span>
                <span><a href="../4_faq/index.html">궁금해요</a></span>
                <span><a href="../5_notice/index.html">알립니다</a></span>
            </nav>                    <!-- gnb -->
            <div class="gnb_icon">
                <div class="search_area">
                    <button type="button" class="search_toggle" aria-label="검색창 열기">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>

                    <form action="../search_result/index.html" method="get" class="search_box">
                        <input 
                        type="search" 
                        name="search_txt" 
                        class="search_txt" 
                        placeholder="검색어를 입력하세요"
                        >

                        <button type="submit" class="search_submit" aria-label="검색">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </form>
                </div>                <!-- search-area -->
                <span class="btn_cart"><a href="#"><i class="fa-solid fa-cart-shopping"></i></a></span>
                <div class="cart_box box">
                    <p class="tit">장바구니</p>
                    <div class="product_box">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="../../img/cart01.jpg" alt="cart01">
                            </div>
                            <div class="popup_txt">
                                <p>불렛저널</p>
                                <p>7,900원</p>
                            </div>
                        </a>
                    </div>
                    <div class="product_box second">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="../../img/cart02.jpg" alt="cart02">
                            </div>
                            <div class="popup_txt">
                                <p>만년 업무 플래너</p>
                                <p>8,900원</p>
                            </div>
                        </a>
                    </div>
                    <div class="product_box">
                        <a href="./sub/2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="../../img/cart03.jpg" alt="cart03">
                            </div>
                            <div class="popup_txt">
                                <p>프로젝트 트래커</p>
                                <p>12,900원</p>
                            </div>
                        </a>
                    </div>
                    <button>결제하기</button>
                </div>     
                             <!-- cart_box -->
                <span class="btn_recent"><a href="#"><i class="fa-solid fa-clock"></i></a></span>
                <div class="recent_box box">
                    <p class="tit">최근 본 상품</p>
                    <div class="product_box">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="../../img/recent01jpg" alt="recent01">
                            </div>
                            <div class="popup_txt">
                                <p>만년형 심플 다이어리</p>
                                <p>8,000원</p>
                            </div>
                        </a>
                    </div>
                    <div class="product_box second">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src=".../../img/recent02.jpg" alt="recent02">
                            </div>
                            <div class="popup_txt">
                                <p>국내여행 플래너</p>
                                <p>6,000원</p>
                            </div>
                        </a>
                    </div>
                    <div class="product_box">
                        <a href="../2_product/all/detail/index.html">
                            <div class="popup_img">
                                <img src="../../img/recent03.jpg" alt="recent03">
                            </div>
                            <div class="popup_txt">
                                <p>소하 만년형 일주일 플래너</p>
                                <p>무료</p>
                            </div>
                        </a>
                    </div>
                    <button>결제하기</button>
                </div>                <!-- recent box -->
                <span><a href="../login/index.html"><i class="fa-solid fa-user"></i></a></span>
            </div>  <!-- gnb_icon -->
        </div>
    </header>           <!-- header -->

    <div class="search_result_box">
        <input type="search" name="search_result" class="search">
        <span><a href="#!"><i class="fa-solid fa-magnifying-glass"></i></a></span>
    </div>

    <div class="wrap">
        <input type="radio" name="search_result" id="search01" checked>
        <input type="radio" name="search_result" id="search02">
        <input type="radio" name="search_result" id="search03">
        <section class="search_result">
            <div>
                <label for="search01">전체</label>
                <label for="search02">상품</label>
                <label for="search03">공지</label>
            </div>
            <div>
                <div class="search_sheet_01"></div>
                <div class="search_sheet_02"></div>
                <div class="search_sheet_03"></div>
            </div>
        </section>
    </div>
</body>
</html>
